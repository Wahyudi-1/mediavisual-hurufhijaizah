<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulator Merangkai Hijaiyah - Kelas 11</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #eff6ff;
            --bg-color: #f3f4f6;
            --text-main: #1f2937;
            --text-light: #6b7280;
            --canvas-bg: #ffffff;
            --grid-color: #e5e7eb;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            background-color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* HEADER */
        .header {
            padding: 1rem;
            background-color: white;
            text-align: center;
            border-bottom: 1px solid var(--grid-color);
        }

        .title {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--primary-dark);
        }

        /* KEYBOARD PANEL */
        .keyboard-panel {
            padding: 1rem;
            background: var(--secondary);
            border-bottom: 1px solid var(--grid-color);
        }

        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.35rem;
            direction: rtl; /* Arab dari kanan ke kiri */
        }

        @media (max-width: 400px) {
            .keyboard-grid { grid-template-columns: repeat(5, 1fr); }
        }

        .key-btn {
            background: white;
            border: 1px solid var(--grid-color);
            border-radius: 0.4rem;
            padding: 0.5rem 0;
            font-family: "Traditional Arabic", "Amiri", "Scheherazade", Arial, serif;
            font-size: 1.5rem;
            color: var(--text-main);
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: all 0.1s;
        }

        .key-btn:active {
            background: var(--primary);
            color: white;
            transform: scale(0.95);
        }

        /* DISPLAY TEXT PANEL */
        .display-panel {
            padding: 1rem;
            background: white;
            border-bottom: 1px solid var(--grid-color);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .display-row {
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* Align right for RTL */
        }

        .display-label {
            font-size: 0.75rem;
            color: var(--text-light);
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .display-box {
            width: 100%;
            min-height: 50px;
            background: var(--bg-color);
            border: 1px dashed var(--guide-color);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: flex-end; /* Align right */
            padding: 0.5rem 1rem;
            font-family: "Traditional Arabic", "Amiri", "Scheherazade", Arial, serif;
            font-size: 2rem;
            direction: rtl;
            overflow-x: auto;
            color: var(--primary-dark);
        }

        /* CANVAS AREA */
        .canvas-container {
            padding: 1rem;
            background: white;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
        }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            background-color: var(--canvas-bg);
            border: 2px solid var(--grid-color);
            border-radius: 0.5rem;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: auto;
            aspect-ratio: 2 / 1;
            touch-action: none;
            cursor: crosshair;
            display: block;
        }

        /* ACTIONS */
        .actions-panel {
            padding: 1rem;
            display: flex;
            gap: 0.5rem;
            background: white;
        }

        .btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:active { opacity: 0.8; }
        .btn-del { background-color: var(--warning); color: #fff; }
        .btn-clear { background-color: var(--danger); }
        .btn-clear-canvas { background-color: var(--primary); }

    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1 class="title">Simulator Merangkai Hijaiyah</h1>
    </div>

    <!-- KEYBOARD HIJAIYAH LENGKAP -->
    <div class="keyboard-panel">
        <div class="keyboard-grid" id="keyboardGrid">
            <!-- Tombol digenerate via JS -->
        </div>
    </div>

    <!-- PANEL TAMPILAN (TERPISAH & BERSAMBUNG) -->
    <div class="display-panel">
        <div class="display-row">
            <div class="display-label">Bentuk Tunggal Terpisah:</div>
            <div class="display-box" id="dispIsolated"></div>
        </div>
        <div class="display-row">
            <div class="display-label">Bentuk Setelah Disambung:</div>
            <div class="display-box" id="dispJoined" style="font-weight: bold;"></div>
        </div>
    </div>

    <!-- AREA LATIHAN MENULIS (CANVAS) -->
    <div class="canvas-container">
        <div class="display-label" style="text-align: center;">Area Latihan Menulis (Coret di atas huruf abu-abu)</div>
        <div class="canvas-wrapper">
            <canvas id="drawCanvas"></canvas>
        </div>
        
        <div class="actions-panel" style="padding: 0.5rem 0 0 0;">
            <button class="btn btn-del" id="btnDel">Hapus 1 Huruf</button>
            <button class="btn btn-clear" id="btnResetAll">Reset Semua</button>
            <button class="btn btn-clear-canvas" id="btnClearCanvas">Bersihkan Kanvas</button>
        </div>
    </div>
</div>

<script>
// DAFTAR HURUF HIJAIYAH LENGKAP (30 Karakter termasuk Hamzah & Ta Marbuthoh)
const HIJAIYAH_LETTERS = [
    'ا', 'ب', 'ت', 'ث', 'ج', 'ح', 'خ', 
    'د', 'ذ', 'ر', 'ز', 'س', 'ش', 'ص', 
    'ض', 'ط', 'ظ', 'ع', 'غ', 'ف', 'ق', 
    'ك', 'ل', 'م', 'ن', 'ه', 'و', 'ي', 
    'ة', 'ء'
];

/** APP STATE */
let state = {
    textArray: [], // Menyimpan urutan huruf yang diklik
    userStrokes: [], // Untuk menyimpan coretan canvas
    isDrawing: false,
    currentStroke: null
};

// DOM Elements
const keyboardGrid = document.getElementById('keyboardGrid');
const dispIsolated = document.getElementById('dispIsolated');
const dispJoined = document.getElementById('dispJoined');
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');

// Canvas Resolution Setup
const LOGICAL_WIDTH = 600;
const LOGICAL_HEIGHT = 300;
let scaleFactor = 1;

function resizeCanvas() {
    const rect = canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = (rect.width * 0.5) * dpr; // 2:1 aspect ratio
    scaleFactor = canvas.width / LOGICAL_WIDTH;
    ctx.setTransform(1, 0, 0, 1, 0, 0); 
    ctx.scale(scaleFactor, scaleFactor);
    renderCanvas();
}
window.addEventListener('resize', resizeCanvas);

/** BUILD KEYBOARD UI */
function buildKeyboard() {
    HIJAIYAH_LETTERS.forEach(letter => {
        const btn = document.createElement('button');
        btn.className = 'key-btn';
        btn.innerText = letter;
        btn.onclick = () => handleKeyPress(letter);
        keyboardGrid.appendChild(btn);
    });
}

/** LOGIKA TEKS */
function handleKeyPress(letter) {
    // Batasi panjang teks agar tidak tumpah dari canvas (max ~15 huruf)
    if(state.textArray.length < 15) {
        state.textArray.push(letter);
        state.userStrokes = []; // Bersihkan coretan jika teks berubah
        updateDisplay();
    }
}

function updateDisplay() {
    // 1. Bentuk Terpisah (Dipisah dengan spasi lebar agar tidak menyambung)
    const isolatedString = state.textArray.join('  ');
    dispIsolated.innerText = isolatedString;

    // 2. Bentuk Bersambung (String normal, browser akan menyambungnya secara otomatis sesuai kaidah Arab)
    const joinedString = state.textArray.join('');
    dispJoined.innerText = joinedString;

    // 3. Update Panduan di Canvas
    renderCanvas();
}

/** RENDER CANVAS (PANDUAN + CORETAN SISWA) */
function renderCanvas() {
    // Clear Background
    ctx.clearRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);
    
    // Draw Grid (Buku Tulis)
    ctx.strokeStyle = '#e5e7eb';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, 150); ctx.lineTo(LOGICAL_WIDTH, 150); // Garis Dasar Tengah
    ctx.moveTo(0, 80); ctx.lineTo(LOGICAL_WIDTH, 80);
    ctx.moveTo(0, 220); ctx.lineTo(LOGICAL_WIDTH, 220);
    ctx.stroke();

    // Render Teks Hijaiyah sebagai Panduan/Mal (Warna Abu-abu Samar)
    if (state.textArray.length > 0) {
        const joinedString = state.textArray.join('');
        
        // Atur ukuran font secara dinamis agar muat
        let fontSize = 120;
        if(state.textArray.length > 6) fontSize = 80;
        if(state.textArray.length > 10) fontSize = 60;

        ctx.font = `bold ${fontSize}px "Traditional Arabic", Amiri, Arial`;
        ctx.fillStyle = '#e5e7eb'; // Warna Panduan
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        // Browser secara ajaib akan me-render teks Arab secara bersambung
        ctx.fillText(joinedString, LOGICAL_WIDTH / 2, 140);
    }

    // Render Coretan Jari Siswa (Warna Biru)
    ctx.strokeStyle = '#2563eb';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    
    state.userStrokes.forEach(stroke => {
        if(stroke.length === 0) return;
        ctx.beginPath();
        ctx.moveTo(stroke[0].x, stroke[0].y);
        for(let i=1; i<stroke.length; i++) {
            ctx.lineTo(stroke[i].x, stroke[i].y);
        }
        ctx.stroke();
    });
}

/** TOUCH / MOUSE INTERACTION UNTUK CANVAS */
function getCanvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    const x = ((e.clientX || e.touches[0].clientX) - rect.left) * (LOGICAL_WIDTH / rect.width);
    const y = ((e.clientY || e.touches[0].clientY) - rect.top) * (LOGICAL_HEIGHT / rect.height);
    return {x, y};
}

canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault(); 
    if(state.textArray.length === 0) return; // Jangan izinkan mencoret jika teks kosong
    state.isDrawing = true;
    state.currentStroke = [getCanvasCoords(e)];
    state.userStrokes.push(state.currentStroke);
    renderCanvas();
});

canvas.addEventListener('pointermove', (e) => {
    e.preventDefault();
    if(!state.isDrawing) return;
    state.currentStroke.push(getCanvasCoords(e));
    renderCanvas(); 
});

canvas.addEventListener('pointerup', () => { state.isDrawing = false; });
canvas.addEventListener('pointercancel', () => { state.isDrawing = false; });
canvas.addEventListener('pointerout', () => { state.isDrawing = false; });

/** TOMBOL AKSI */
document.getElementById('btnDel').addEventListener('click', () => {
    if(state.textArray.length > 0) {
        state.textArray.pop();
        state.userStrokes = []; // Hapus coretan karena teks berubah
        updateDisplay();
    }
});

document.getElementById('btnResetAll').addEventListener('click', () => {
    state.textArray = [];
    state.userStrokes = [];
    updateDisplay();
});

document.getElementById('btnClearCanvas').addEventListener('click', () => {
    state.userStrokes = [];
    renderCanvas();
});

// INITIALIZATION
window.onload = () => {
    buildKeyboard();
    resizeCanvas();
};

</script>
</body>
</html>
